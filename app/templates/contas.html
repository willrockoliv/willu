{% extends "base.html" %}
{% block title %}Contas - Willu{% endblock %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">Contas</h1>
        <p class="text-sm text-gray-500 mt-1">Gerencie suas contas bancárias e carteiras</p>
    </div>

    <!-- Formulário de nova conta -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
        <h2 class="text-sm font-semibold text-gray-700 mb-3">Nova Conta</h2>
        <form hx-post="/contas/" hx-target="#contas-lista" hx-swap="innerHTML" class="flex flex-wrap items-end gap-3">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-medium text-gray-500 mb-1">Nome</label>
                <input type="text" name="nome" required placeholder="Ex: NuConta, Itaú, Carteira..."
                    class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500 text-sm">
            </div>
            <div class="w-40">
                <label class="block text-xs font-medium text-gray-500 mb-1">Saldo Inicial (R$)</label>
                <input type="number" name="saldo_inicial" step="0.01" value="0" placeholder="0,00"
                    class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500 text-sm">
            </div>
            <button type="submit" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg transition-colors">
                Adicionar
            </button>
        </form>
    </div>

    <!-- Lista -->
    <div id="contas-lista">
        {% include "partials/contas_lista.html" %}
    </div>
</div>
{% endblock %}
