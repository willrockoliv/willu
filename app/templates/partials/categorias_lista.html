<!-- Lista de Categorias Partial -->
{% if categorias %}
<div class="overflow-x-auto">
    <table class="w-full text-sm">
        <thead>
            <tr class="border-b border-gray-200">
                <th class="text-left py-3 px-4 font-medium text-gray-500">Nome</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Tipo</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Natureza</th>
                <th class="text-center py-3 px-4 font-medium text-gray-500">Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for cat in categorias %}
            <tr class="border-b border-gray-100 hover:bg-gray-50">
                <td class="py-3 px-4 font-medium text-gray-800">{{ cat.nome }}</td>
                <td class="py-3 px-4">
                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium
                        {% if cat.tipo.value == 'Receita' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
                        {{ cat.tipo.value }}
                    </span>
                </td>
                <td class="py-3 px-4">
                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium
                        {% if cat.natureza.value == 'Fixa' %}bg-blue-100 text-blue-700
                        {% elif cat.natureza.value == 'Recorrente' %}bg-purple-100 text-purple-700
                        {% else %}bg-gray-100 text-gray-700{% endif %}">
                        {{ cat.natureza.value }}
                    </span>
                </td>
                <td class="py-3 px-4 text-center">
                    <button
                        hx-delete="/categorias/{{ cat.id }}"
                        hx-target="#categorias-lista"
                        hx-confirm="Excluir categoria '{{ cat.nome }}'?"
                        class="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-600"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="text-center py-8 text-gray-400">
    <p class="text-sm">Nenhuma categoria cadastrada.</p>
</div>
{% endif %}
