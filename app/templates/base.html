<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Willu - Finanças Pessoais{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <!-- Dark mode: aplicar antes do render para evitar flash branco -->
    <script>
        if (localStorage.getItem('darkMode') === 'true' ||
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-flex; }
        .htmx-request.htmx-indicator { display: inline-flex; }
        /* Dark mode global para form elements */
        .dark select, .dark input[type="text"], .dark input[type="number"],
        .dark input[type="date"], .dark input[type="file"], .dark textarea {
            background-color: rgb(55 65 81);
            border-color: rgb(75 85 99);
            color: rgb(243 244 246);
        }
        .dark select option { background-color: rgb(55 65 81); color: rgb(243 244 246); }
        .dark input::placeholder { color: rgb(156 163 175); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' },
                        accent: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 transition-colors" hx-boost="true">
    <div class="min-h-full">
        <!-- Navbar -->
        <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="/" class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                            </div>
                            <span class="text-xl font-bold text-gray-900 dark:text-white">Willu</span>
                        </a>
                        <div class="hidden sm:ml-8 sm:flex sm:space-x-1">
                            <a href="/" class="px-3 py-2 rounded-md text-sm font-medium {% if request.url.path == '/' %}bg-primary-50 text-primary-700 dark:bg-primary-900/40 dark:text-primary-300{% else %}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-700{% endif %}">
                                Dashboard
                            </a>
                            <a href="/transacoes/" class="px-3 py-2 rounded-md text-sm font-medium {% if '/transacoes' in request.url.path %}bg-primary-50 text-primary-700 dark:bg-primary-900/40 dark:text-primary-300{% else %}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-700{% endif %}">
                                Transações
                            </a>
                            <a href="/categorias/" class="px-3 py-2 rounded-md text-sm font-medium {% if '/categorias' in request.url.path %}bg-primary-50 text-primary-700 dark:bg-primary-900/40 dark:text-primary-300{% else %}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-700{% endif %}">
                                Categorias
                            </a>
                            <a href="/contas/" class="px-3 py-2 rounded-md text-sm font-medium {% if '/contas' in request.url.path %}bg-primary-50 text-primary-700 dark:bg-primary-900/40 dark:text-primary-300{% else %}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-700{% endif %}">
                                Contas
                            </a>
                            <a href="/importacao/" class="px-3 py-2 rounded-md text-sm font-medium {% if '/importacao' in request.url.path %}bg-primary-50 text-primary-700 dark:bg-primary-900/40 dark:text-primary-300{% else %}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-700{% endif %}">
                                Importar
                            </a>
                        </div>
                    </div>
                    <!-- Dark mode toggle -->
                    <div class="flex items-center">
                        <button onclick="toggleDarkMode()" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Alternar modo escuro">
                            <!-- Sol (visível no dark) -->
                            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                            <!-- Lua (visível no light) -->
                            <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- FAB (Floating Action Button) para Entrada Rápida -->
    <button
        onclick="document.getElementById('modal-transacao').classList.remove('hidden')"
        hx-get="/transacoes/form"
        hx-target="#modal-transacao-body"
        class="fixed bottom-6 right-6 w-14 h-14 bg-primary-600 hover:bg-primary-700 text-white rounded-full shadow-lg flex items-center justify-center transition-all hover:scale-110 z-50"
        title="Nova Transação"
    >
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
    </button>

    <!-- Modal de Transação -->
    <div id="modal-transacao" class="hidden fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 bg-black bg-opacity-40 transition-opacity" onclick="document.getElementById('modal-transacao').classList.add('hidden')"></div>
            <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-lg w-full p-6 z-10">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Nova Transação</h3>
                    <button onclick="document.getElementById('modal-transacao').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="modal-transacao-body">
                    <!-- Carregado via HTMX -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts globais -->
    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }

        document.body.addEventListener('transacaoCriada', function() {
            setTimeout(() => {
                document.getElementById('modal-transacao').classList.add('hidden');
                if (window.location.pathname === '/') {
                    window.location.reload();
                }
            }, 800);
        });
        document.body.addEventListener('transacaoAtualizada', function() {
            setTimeout(() => {
                document.getElementById('modal-transacao').classList.add('hidden');
                if (window.location.pathname === '/') {
                    window.location.reload();
                }
            }, 800);
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
