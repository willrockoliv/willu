{% extends "base.html" %}
{% block title %}Transações - Willu{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Transações</h1>
            <p class="text-sm text-gray-500 mt-1">Gerencie suas receitas e despesas</p>
        </div>
        <button
            hx-get="/transacoes/form"
            hx-target="#modal-transacao-body"
            onclick="document.getElementById('modal-transacao').classList.remove('hidden')"
            class="inline-flex items-center px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg transition-colors"
        >
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nova Transação
        </button>
    </div>

    <!-- Filtros -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
        <form class="flex flex-wrap items-end gap-4" method="GET" action="/transacoes/">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Mês</label>
                <select name="mes" class="rounded-lg border-gray-300 text-sm">
                    {% for m in range(1, 13) %}
                    <option value="{{ m }}" {% if m == mes %}selected{% endif %}>
                        {{ ['', 'Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'][m] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Ano</label>
                <select name="ano" class="rounded-lg border-gray-300 text-sm">
                    {% for a in range(hoje.year - 2, hoje.year + 3) %}
                    <option value="{{ a }}" {% if a == ano %}selected{% endif %}>{{ a }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Conta</label>
                <select name="conta_id" class="rounded-lg border-gray-300 text-sm">
                    <option value="">Todas</option>
                    {% for conta in contas %}
                    <option value="{{ conta.id }}" {% if conta.id == conta_id %}selected{% endif %}>{{ conta.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                Filtrar
            </button>
        </form>
    </div>

    <!-- Lista de Transações -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100" id="transacoes-lista"
        hx-trigger="transacaoCriada from:body, transacaoAtualizada from:body, transacaoDeletada from:body"
        hx-get="/transacoes/lista?mes={{ mes }}&ano={{ ano }}{% if conta_id %}&conta_id={{ conta_id }}{% endif %}"
        hx-swap="innerHTML"
    >
        {% include "partials/transacoes_lista.html" %}
    </div>
</div>
{% endblock %}
